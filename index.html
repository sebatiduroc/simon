<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Simon Pocket</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  html,body{width:100%;height:100%;background:#0a0a12;}
  #app{
    display:flex;flex-direction:column;align-items:center;
    justify-content:space-between;
    width:100%;min-height:100%;
    padding:8px 12px 10px;
    background:#0a0a12;
    font-family:'Share Tech Mono',monospace;
    color:#e0e0f0;gap:6px;
    user-select:none;-webkit-user-select:none;
  }
  #app.fullscreen{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;overflow:hidden;justify-content:space-evenly;}
  .top-row{display:flex;width:100%;align-items:center;justify-content:space-between;}
  .title-block{display:flex;flex-direction:column;}
  h1{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;letter-spacing:3px;color:#fff;text-shadow:0 0 16px #3a86ff66;}
  .subtitle{font-size:8px;color:#6060a0;letter-spacing:3px;}
  .fs-btn{background:transparent;border:1px solid #333360;color:#6060a0;border-radius:6px;padding:5px 8px;cursor:pointer;font-size:13px;outline:none;}
  .fs-btn:hover{border-color:#3a86ff;color:#80b3ff;}

  .mode-row,.diff-row{display:flex;gap:5px;width:100%;}
  .mode-btn,.diff-btn{
    flex:1;font-family:'Orbitron',sans-serif;font-size:8px;
    padding:6px 2px;border-radius:6px;
    border:1.5px solid #333360;background:transparent;color:#6060a0;
    cursor:pointer;letter-spacing:0.5px;transition:all .15s;outline:none;
  }
  .mode-btn:hover,.diff-btn:hover{border-color:#e0e0f0;color:#e0e0f0;}
  .mode-btn.active,.diff-btn.active{background:#1a1a2e;border-color:#3a86ff;color:#80b3ff;}
  .mode-btn.gm.active{border-color:#ffd60a;color:#ffe566;background:#1e1800;}
  .mode-btn.insane.active{border-color:#ff4455;color:#ff8090;background:#1e0005;}

  .board-wrap{width:min(280px,calc(100vw - 24px));aspect-ratio:1;flex-shrink:0;}
  #app.fullscreen .board-wrap{width:min(320px,calc(100vw - 24px));}
  .board-wrap svg{width:100%;height:100%;outline:none;}

  .score-panel{display:flex;gap:20px;align-items:center;justify-content:center;}
  .score-block{text-align:center;}
  .score-label{font-size:8px;color:#6060a0;letter-spacing:2px;}
  .score-val{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;color:#fff;}

  .speed-bar-wrap{width:100%;max-width:280px;}
  .speed-label{font-size:8px;color:#6060a0;letter-spacing:2px;margin-bottom:3px;display:flex;justify-content:space-between;}
  .speed-bar-bg{height:3px;background:#16163a;border-radius:2px;overflow:hidden;}
  .speed-bar{height:100%;background:linear-gradient(90deg,#3a86ff,#ff8500);border-radius:2px;transition:width .4s;width:0%;}

  .status-text{font-size:11px;color:#6060a0;letter-spacing:2px;min-height:15px;text-align:center;}
  .status-text.error{color:#ff6b7a;animation:shake .3s;}
  .status-text.success{color:#5fff82;}
  .status-text.warn{color:#ffd60a;}
  .status-text.insane{color:#ff4455;animation:pulse .6s infinite alternate;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  @keyframes pulse{from{opacity:.6}to{opacity:1}}

  .combo-badge{font-family:'Orbitron',sans-serif;font-size:8px;padding:3px 10px;border-radius:20px;background:#12121e;border:1px solid #333360;color:#6060a0;letter-spacing:1px;}
  .combo-badge.active{border-color:#ffd60a;color:#ffe566;background:#1e1800;}
  .combo-badge.insane{border-color:#ff4455;color:#ff8090;background:#1e0005;}

  .action-btn{font-family:'Orbitron',sans-serif;font-size:12px;padding:10px 0;width:100%;max-width:280px;border-radius:8px;border:1.5px solid #3a86ff;background:#0d1a40;color:#80b3ff;cursor:pointer;letter-spacing:2px;transition:all .2s;outline:none;}
  .action-btn:hover{background:#1a2e60;border-color:#80b3ff;}
  .action-btn:disabled{opacity:.4;cursor:default;}

  .credit{font-size:9px;color:#333360;letter-spacing:1px;text-align:center;padding-top:2px;}

  /* ── Écran d'accueil ── */
  #screen-home{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    width:100%;min-height:100%;padding:32px 20px 24px;gap:24px;
    background:#0a0a12;font-family:'Share Tech Mono',monospace;
    user-select:none;-webkit-user-select:none;
  }
  #screen-home h1{font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;letter-spacing:5px;color:#fff;text-shadow:0 0 30px #3a86ff88;text-align:center;}
  #screen-home .subtitle{font-size:10px;color:#6060a0;letter-spacing:4px;text-align:center;}
  .home-section{width:100%;max-width:300px;display:flex;flex-direction:column;gap:8px;}
  .home-section-label{font-size:9px;color:#6060a0;letter-spacing:3px;text-align:center;}
  .home-mode-row,.home-diff-row{display:flex;gap:6px;width:100%;}
  .home-mode-btn,.home-diff-btn{
    flex:1;font-family:'Orbitron',sans-serif;font-size:8px;
    padding:9px 2px;border-radius:7px;
    border:1.5px solid #333360;background:transparent;color:#6060a0;
    cursor:pointer;letter-spacing:0.5px;transition:all .15s;outline:none;
  }
  .home-mode-btn:hover,.home-diff-btn:hover{border-color:#e0e0f0;color:#e0e0f0;}
  .home-mode-btn.active,.home-diff-btn.active{background:#1a1a2e;border-color:#3a86ff;color:#80b3ff;}
  .home-mode-btn.gm.active{border-color:#ffd60a;color:#ffe566;background:#1e1800;}
  .home-mode-btn.insane.active{border-color:#ff4455;color:#ff8090;background:#1e0005;}
  .home-start-btn{
    font-family:'Orbitron',sans-serif;font-size:14px;padding:14px 0;
    width:100%;max-width:300px;border-radius:8px;
    border:1.5px solid #3a86ff;background:#0d1a40;color:#80b3ff;
    cursor:pointer;letter-spacing:3px;transition:all .2s;outline:none;
  }
  .home-start-btn:hover{background:#1a2e60;border-color:#80b3ff;}
  .deco-board{opacity:0.18;pointer-events:none;width:160px;height:160px;}

  /* ── Écran de jeu ── */
  #screen-game{display:none;}
  #screen-game.active{display:flex;}
  .back-btn{
    background:transparent;border:1px solid #333360;color:#6060a0;
    border-radius:6px;padding:5px 9px;cursor:pointer;font-size:12px;
    outline:none;font-family:'Share Tech Mono',monospace;letter-spacing:1px;
    transition:all .2s;
  }
  .back-btn:hover{border-color:#ff6b7a;color:#ff6b7a;}
</style>
</head>
<body>

<!-- ══ ÉCRAN D'ACCUEIL ══ -->
<div id="screen-home">
  <div>
    <h1>SIMON</h1>
    <div class="subtitle">POCKET EDITION</div>
  </div>

  <!-- Simon décoratif -->
  <svg class="deco-board" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" id="deco-svg"></svg>

  <div class="home-section">
    <div class="home-section-label">MODE</div>
    <div class="home-mode-row">
      <button class="home-mode-btn active" data-mode="rookie" onclick="homeSetMode('rookie')">ROOKIE</button>
      <button class="home-mode-btn gm" data-mode="gm" onclick="homeSetMode('gm')">GRAND MAÎTRE</button>
      <button class="home-mode-btn insane" data-mode="insane" onclick="homeSetMode('insane')">INSANE</button>
    </div>
  </div>

  <div class="home-section">
    <div class="home-section-label">COULEURS</div>
    <div class="home-diff-row">
      <button class="home-diff-btn active" data-diff="4" onclick="homeSetDiff(4)">4 COULEURS</button>
      <button class="home-diff-btn" data-diff="5" onclick="homeSetDiff(5)">5 COULEURS</button>
      <button class="home-diff-btn" data-diff="6" onclick="homeSetDiff(6)">6 COULEURS</button>
    </div>
  </div>

  <button class="home-start-btn" onclick="goToGame()">▶ JOUER</button>
  <div class="credit">Créé par Sébastien Dumortier</div>
</div>

<!-- ══ ÉCRAN DE JEU ══ -->
<div id="screen-game" class="fullscreen-capable">
<div id="app">
  <div class="top-row">
    <button class="back-btn" onclick="goToHome()">← ACCUEIL</button>
    <button class="fs-btn" id="fs-btn" onclick="toggleFullscreen()">⛶</button>
  </div>

  <div class="board-wrap">
    <svg id="board-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div class="score-panel">
    <div class="score-block"><div class="score-label">SCORE</div><div class="score-val" id="score">0</div></div>
    <div class="score-block"><div class="score-label">MEILLEUR</div><div class="score-val" id="best">0</div></div>
  </div>

  <div class="speed-bar-wrap">
    <div class="speed-label"><span>VITESSE</span><span id="speed-pct">0%</span></div>
    <div class="speed-bar-bg"><div class="speed-bar" id="speed-bar"></div></div>
  </div>

  <div class="status-text" id="status">PRÊT !</div>
  <div class="combo-badge" id="combo-badge">PALIER 1</div>
  <button class="action-btn" id="main-btn" onclick="startGame()">DÉMARRER</button>
  <div class="credit">Créé par Sébastien Dumortier</div>
</div>
</div>

<script>
const COLORS=[
  {id:'red',    fill:'#c0202a',lit:'#ff4455',label:'R'},
  {id:'green',  fill:'#1a7a30',lit:'#2dc653',label:'G'},
  {id:'blue',   fill:'#1a4fa0',lit:'#3a86ff',label:'B'},
  {id:'yellow', fill:'#8a6a00',lit:'#ffd60a',label:'Y'},
  {id:'orange', fill:'#8a4200',lit:'#ff8500',label:'O'},
  {id:'purple', fill:'#4a1a80',lit:'#9b5de5',label:'P'},
];
const FREQS={red:261,green:329,blue:392,yellow:523,orange:440,purple:587};

let audioCtx, diff=4, mode='rookie';
let sequence=[], step=0, score=0, best=0;
let playing=false, playerTurn=false, level=1, isFull=false;
let learnDone=false;
let insaneDisplayMap={};

function homeSetMode(m){
  mode=m;
  document.querySelectorAll('.home-mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
}
function homeSetDiff(d){
  diff=d;
  document.querySelectorAll('.home-diff-btn').forEach(b=>b.classList.toggle('active',+b.dataset.diff===d));
}
function goToGame(){
  document.getElementById('screen-home').style.display='none';
  document.getElementById('screen-game').style.display='block';
  buildBoard();updateSpeed();
  setStatus('PRÊT !','');
  document.getElementById('main-btn').disabled=false;
}
function goToHome(){
  playing=false;playerTurn=false;
  COLORS.slice(0,diff).forEach(c=>litArc(c.id,false));
  document.getElementById('screen-game').style.display='none';
  document.getElementById('screen-home').style.display='flex';
  if(isFull){
    isFull=false;
    document.getElementById('app').classList.remove('fullscreen');
    document.getElementById('fs-btn').textContent='⛶';
    try{document.exitFullscreen&&document.exitFullscreen().catch(()=>{});}catch(e){}
  }
}
function buildDecoBoard(){
  const svg=document.getElementById('deco-svg');
  if(!svg)return;
  svg.innerHTML='';
  const colors=COLORS.slice(0,4);
  const cx=150,cy=150,r1=55,r2=138,gap=4;
  const angleStep=(2*Math.PI)/4;
  colors.forEach((c,i)=>{
    const startA=-Math.PI/2+i*angleStep+gap/r2;
    const endA=-Math.PI/2+(i+1)*angleStep-gap/r2;
    const cos1=Math.cos(startA),sin1=Math.sin(startA),cos2=Math.cos(endA),sin2=Math.sin(endA);
    const d=`M${cx+r1*cos1},${cy+r1*sin1} L${cx+r2*cos1},${cy+r2*sin1} A${r2},${r2},0,0,1,${cx+r2*cos2},${cy+r2*sin2} L${cx+r1*cos2},${cy+r1*sin2} A${r1},${r1},0,0,0,${cx+r1*cos1},${cy+r1*sin1}`;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',d);path.setAttribute('fill',c.lit);
    path.setAttribute('stroke','#0a0a12');path.setAttribute('stroke-width','2');
    svg.appendChild(path);
  });
  const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('cx',150);circle.setAttribute('cy',150);circle.setAttribute('r',52);
  circle.setAttribute('fill','#0a0a12');svg.appendChild(circle);
}

function toggleFullscreen(){
  const app=document.getElementById('app');
  isFull=!isFull;
  app.classList.toggle('fullscreen',isFull);
  document.getElementById('fs-btn').textContent=isFull?'✕':'⛶';
  try{isFull?document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen().catch(()=>{}):document.exitFullscreen&&document.exitFullscreen().catch(()=>{});}catch(e){}
}

function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(colorId,duration=300){
  try{
    const ctx=getAudio(),osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sine';osc.frequency.setValueAtTime(FREQS[colorId],ctx.currentTime);
    gain.gain.setValueAtTime(0,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.35,ctx.currentTime+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+duration/1000);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+duration/1000);
  }catch(e){}
}
function playError(){
  try{
    const ctx=getAudio(),osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sawtooth';osc.frequency.value=120;
    gain.gain.setValueAtTime(0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.4);
  }catch(e){}
}
function playSuccess(){
  [523,659,784].forEach((f,i)=>{
    try{
      const ctx=getAudio(),o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+i*0.12);
      g.gain.linearRampToValueAtTime(0.25,ctx.currentTime+i*0.12+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.18);
      o.start(ctx.currentTime+i*0.12);o.stop(ctx.currentTime+i*0.12+0.2);
    }catch(e){}
  });
}

function getSpeed(){return Math.max(180,700-level*18-Math.floor((level-1)/5)*60);}
function getSpeedPct(){return Math.round(((700-getSpeed())/(700-180))*100);}

function buildBoard(){
  const svg=document.getElementById('board-svg');
  svg.innerHTML='';
  const colors=COLORS.slice(0,diff);
  const cx=150,cy=150,r1=55,r2=138,gap=4;
  const angleStep=(2*Math.PI)/colors.length;
  colors.forEach((c,i)=>{
    const startA=-Math.PI/2+i*angleStep+gap/r2;
    const endA=-Math.PI/2+(i+1)*angleStep-gap/r2;
    const cos1=Math.cos(startA),sin1=Math.sin(startA);
    const cos2=Math.cos(endA),sin2=Math.sin(endA);
    const largeArc=(endA-startA>Math.PI)?1:0;
    const d=`M${cx+r1*cos1},${cy+r1*sin1} L${cx+r2*cos1},${cy+r2*sin1} A${r2},${r2},0,${largeArc},1,${cx+r2*cos2},${cy+r2*sin2} L${cx+r1*cos2},${cy+r1*sin2} A${r1},${r1},0,${largeArc},0,${cx+r1*cos1},${cy+r1*sin1}`;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',d);path.setAttribute('fill',c.fill);
    path.setAttribute('stroke','#0a0a12');path.setAttribute('stroke-width','2');
    path.id='arc-'+c.id;path.style.cursor='pointer';path.style.outline='none';
    path.addEventListener('touchstart',(e)=>{e.preventDefault();handlePlayerClick(c.id);},{passive:false});
    path.addEventListener('mousedown',(e)=>{e.preventDefault();handlePlayerClick(c.id);});
    const midA=(startA+endA)/2,textR=(r1+r2)*0.5;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',cx+textR*Math.cos(midA));t.setAttribute('y',cy+textR*Math.sin(midA)+5);
    t.setAttribute('text-anchor','middle');t.setAttribute('font-size','13');
    t.setAttribute('font-family','Orbitron');t.setAttribute('fill','#ffffff33');
    t.setAttribute('pointer-events','none');t.textContent=c.label;
    svg.appendChild(path);svg.appendChild(t);
  });
  const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('cx',150);circle.setAttribute('cy',150);circle.setAttribute('r',52);
  circle.setAttribute('fill','#0a0a12');circle.setAttribute('pointer-events','none');
  svg.appendChild(circle);
  const logo=document.createElementNS('http://www.w3.org/2000/svg','text');
  logo.setAttribute('x',150);logo.setAttribute('y',156);
  logo.setAttribute('text-anchor','middle');logo.setAttribute('font-size','10');
  logo.setAttribute('font-family','Orbitron');logo.setAttribute('fill','#3a86ff');
  logo.setAttribute('pointer-events','none');logo.textContent='SIMON';
  svg.appendChild(logo);
}

function litArc(colorId,on){
  const arc=document.getElementById('arc-'+colorId);
  if(!arc)return;
  arc.setAttribute('fill',on?COLORS.find(x=>x.id===colorId).lit:COLORS.find(x=>x.id===colorId).fill);
}
function setStatus(msg,cls=''){const el=document.getElementById('status');el.textContent=msg;el.className='status-text '+cls;}
function setScore(n){
  score=n;document.getElementById('score').textContent=n;
  if(n>best){best=n;document.getElementById('best').textContent=n;}
}
function updateSpeed(){
  const pct=getSpeedPct();
  document.getElementById('speed-bar').style.width=pct+'%';
  document.getElementById('speed-pct').textContent=pct+'%';
  const palier=Math.floor((level-1)/5)+1;
  const badge=document.getElementById('combo-badge');
  badge.textContent='PALIER '+palier+' | NIVEAU '+level;
  badge.className='combo-badge'+(mode==='insane'?' insane':palier>1?' active':'');
}
function setMode(m){
  if(playing)return;
  mode=m;learnDone=false;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
}
function setDiff(d){
  if(playing)return;
  diff=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('active',+b.dataset.diff===d));
  buildBoard();
}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}

async function learnPhase(){
  const colors=COLORS.slice(0,diff);
  setStatus('ÉCOUTE ET MÉMORISE...','warn');
  await delay(600);
  for(let rep=0;rep<2;rep++){
    for(let i=0;i<colors.length;i++){
      const c=colors[i];
      litArc(c.id,true);
      playTone(c.id,500);
      await delay(600);
      litArc(c.id,false);
      await delay(200);
    }
    if(rep===0) await delay(400);
  }
  setStatus('MÉMORISÉ ? C\'EST PARTI !','warn');
  await delay(800);
  learnDone=true;
}

function makeInsaneMap(colors){
  const ids=colors.map(c=>c.id);
  let shuffled;
  do{shuffled=[...ids].sort(()=>Math.random()-0.5);}
  while(shuffled.some((v,i)=>v===ids[i]));
  const map={};
  ids.forEach((id,i)=>map[id]=shuffled[i]);
  return map;
}

async function playSequence(){
  const ms=getSpeed();
  const pause=Math.max(100,ms*0.4);
  const colors=COLORS.slice(0,diff);
  if(mode==='insane') insaneDisplayMap=makeInsaneMap(colors);
  for(let i=0;i<sequence.length;i++){
    await delay(pause);
    const soundColor=sequence[i];
    if(mode==='rookie'){
      litArc(soundColor,true);playTone(soundColor,ms*0.75);
      await delay(ms*0.75);litArc(soundColor,false);
    } else if(mode==='gm'){
      playTone(soundColor,ms*0.75);
      await delay(ms*0.75);
    } else if(mode==='insane'){
      const fakeColor=insaneDisplayMap[soundColor];
      litArc(fakeColor,true);playTone(soundColor,ms*0.75);
      await delay(ms*0.75);litArc(fakeColor,false);
    }
  }
  await delay(300);
  playerTurn=true;step=0;
  if(mode==='gm') setStatus('QUEL SON C\'ÉTAIT ?','warn');
  else if(mode==='insane') setStatus('IGNORE LES COULEURS !','insane');
  else setStatus('À TON TOUR...','success');
}

async function startGame(){
  if(playing)return;
  playing=true;level=1;sequence=[];learnDone=false;setScore(0);updateSpeed();
  document.getElementById('main-btn').disabled=true;
  document.querySelectorAll('.diff-btn,.mode-btn').forEach(b=>b.disabled=true);
  if(mode==='gm'||mode==='insane') await learnPhase();
  nextRound();
}

async function nextRound(){
  playerTurn=false;
  const colors=COLORS.slice(0,diff);
  sequence.push(colors[Math.floor(Math.random()*diff)].id);
  setStatus(mode==='rookie' ? 'REGARDE...' : 'ÉCOUTE...','');updateSpeed();
  await delay(500);await playSequence();
}

let lastClick=0;
async function handlePlayerClick(colorId){
  if(!playerTurn)return;
  const now=Date.now();
  if(now-lastClick<80)return;
  lastClick=now;
  litArc(colorId,true);playTone(colorId,180);
  await delay(180);litArc(colorId,false);
  if(colorId!==sequence[step]){await gameOver(sequence[step]);return;}
  step++;
  if(step===sequence.length){
    playerTurn=false;setScore(score+1);level++;
    playSuccess();setStatus('BRAVO ! +1','success');
    await delay(700);nextRound();
  }
}

async function gameOver(correctColor){
  playerTurn=false;playing=false;
  // Joue et illumine la bonne touche 3x plus longtemps
  const revealMs=getSpeed()*0.75*3;
  if(correctColor){
    litArc(correctColor,true);
    playTone(correctColor,revealMs);
    await delay(revealMs);
    litArc(correctColor,false);
    await delay(200);
  }
  playError();
  setStatus('PERDU ! Score: '+score,'error');
  await flashAll();
  document.getElementById('main-btn').disabled=false;
  document.querySelectorAll('.diff-btn,.mode-btn').forEach(b=>b.disabled=false);
}
async function flashAll(){
  for(let i=0;i<3;i++){
    COLORS.slice(0,diff).forEach(c=>litArc(c.id,true));
    await delay(200);
    COLORS.slice(0,diff).forEach(c=>litArc(c.id,false));
    await delay(200);
  }
}

document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement&&isFull){
    isFull=false;document.getElementById('app').classList.remove('fullscreen');
    document.getElementById('fs-btn').textContent='⛶';
  }
});

buildDecoBoard();
</script>
